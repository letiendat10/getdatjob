name: Daily Job Scraper

on:
  schedule:
    - cron: "0 6 * * *"   # 6 AM UTC daily
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Pull jobs from all ATS
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/03_pull_jobs.py

      - name: Enrich Workday descriptions
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/enrich_workday_descriptions.py --limit 500

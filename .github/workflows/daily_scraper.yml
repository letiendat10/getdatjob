name: Daily Job Scraper

on:
  schedule:
    - cron: "0 6 * * *"    # 11 PM PT — catches overnight posts before morning
    - cron: "0 14 * * *"   # 7 AM PT — catches jobs posted during business hours
    - cron: "0 20 * * *"   # 3 AM PT — catches jobs posted during business hours
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 200      # pull + concurrent inline enrichment (public repo = free minutes)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Pull jobs from all ATS
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # tee to a log so the failure report below can surface the real error on the run's
        # Summary page (pipefail makes the step still fail on a non-zero python exit).
        run: |
          set -o pipefail
          python scrapers/03_pull_jobs.py 2>&1 | tee /tmp/pull.log

      # 03_pull_jobs.py now ENRICHES as it pulls: a concurrent pool fills description_text +
      # salary + exact posted_at and finalizes the confidence tier for each new list-only-ATS
      # job (Workday/SmartRecruiters/iCIMS) within minutes of pulling it — reusing enrich_one().
      # Enrichment rides the pull because the pull is the one process that reliably runs AND
      # the only source of new jobs (they arrive in these 3 daily batches, not continuously),
      # so the GitHub-cron always-on worker was both unreliable and unnecessary (now retired).
      # enrich.yml remains the daily backstop for the few detail-fetch failures.

      # Surface WHY a run failed on the Summary page instead of a bare "exit code 1".
      - name: Failure report
        if: failure()
        run: |
          {
            echo "## ❌ Daily Job Scraper failed"
            echo ""
            echo "Step **Pull jobs from all ATS** (\`scrapers/03_pull_jobs.py\`) exited non-zero."
            echo ""
            echo "### Last 40 log lines"
            echo '```'
            tail -n 40 /tmp/pull.log 2>/dev/null || echo "(no log captured — failure was before the pull step, e.g. dependency install)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

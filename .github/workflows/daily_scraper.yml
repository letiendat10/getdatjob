name: Daily Job Scraper

on:
  schedule:
    - cron: "0 2 * * *"   # 7 PM PT  — Evening check
    - cron: "0 6 * * *"   # 11 PM PT — Overnights
    - cron: "0 10 * * *"  # 3 AM PT  — Early morning
    - cron: "0 14 * * *"  # 7 AM PT  — Start of business
    - cron: "0 18 * * *"  # 11 AM PT — Mid-day
    - cron: "0 22 * * *"  # 3 PM PT  — End of business
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Pull jobs from all ATS
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/03_pull_jobs.py

      # Fill description_text, salary (range + numeric bounds) and the exact Workday
      # posting date for list-only ATSes (Workday/SmartRecruiters/iCIMS). Runs right
      # after the pull so new jobs get a precise posted_at the same day; the larger
      # backlog is chewed by the separate enrich.yml workflow.
      - name: Enrich descriptions + salary + dates
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/04_enrich_descriptions.py --limit 20000

      # Re-score confidence tiers using freshly enriched descriptions. Jobs whose
      # description_text just got filled in can now flip from 'friendly' → 'verified'
      # (or get 'excluded' if a no-sponsor clause appears). Runs fast — skips
      # already-verified/excluded jobs.
      - name: Rescore job signals
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/05_rescore_job_signals.py

name: Enrich Job Descriptions

# BACKSTOP ONLY. The realtime enrich_worker.yml is now the primary enricher (LISTEN/NOTIFY
# + continuous backlog sweep). This once-a-day batch run is insurance in case the worker
# workflow is ever down — it's resumable and skips immediately when there are no candidates.

on:
  schedule:
    - cron: "30 5 * * *"   # once daily backstop (worker handles the rest in realtime)
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Enrich descriptions + salary + dates
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scrapers/04_enrich_descriptions.py --limit 20000

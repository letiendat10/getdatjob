name: Realtime Enrich Worker

# Always-on enrichment. A Postgres LISTEN/NOTIFY trigger fires the moment a list-only-ATS
# job is pulled without a description; this worker enriches it within seconds (reusing
# 04_enrich_descriptions.enrich_one), and sweeps the backlog newest-/highest-LCA-first
# between notifications. The worker self-limits to ~5.5h (< the 6h job cap); the hourly
# schedule + concurrency guard keep exactly one running and hand off with no gap. Public
# repo => unlimited Actions minutes, so "continuous" is free.

on:
  schedule:
    - cron: "0 * * * *"   # hourly trigger; concurrency serializes to a single running worker
  workflow_dispatch:

concurrency:
  group: enrich-worker
  cancel-in-progress: false   # a new trigger waits as "pending", then takes over at handoff

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # safety net above the worker's own --max-runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt
      - name: Run realtime enrich worker
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}   # session pooler (port 5432) — enables LISTEN
        run: python scrapers/enrich_worker.py --max-runtime 19800 --concurrency 6
